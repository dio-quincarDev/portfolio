# SQLite In-Memory for Tests
spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.defer-datasource-initialization=true

# SQL Init (Deshabilitado en tests)
spring.sql.init.mode=never

# JWT Configuration (Mismo que main para consistencia)
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLXBvcnRmb2xpby1kZW1vLXVzYWdl}
jwt.header=Authorization
jwt.prefix=Bearer
jwt.expiration-time=86400000
app.security.super-admin-registration.enabled=true
