server.port=8081
spring.application.name=Feature Flag API

# SQLite Database
spring.datasource.url=jdbc:sqlite:./data/feature_flags.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.defer-datasource-initialization=true

# SQL Init (loads data.sql after Hibernate DDL)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.sql.init.data-locations=classpath:data.sql

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api/v1/feature-flags/v3/api-docs
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.filter=true

# JWT Configuration
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXN1cGVyLXNlY3JldC1rZXktZm9yLXBvcnRmb2xpby1kZW1vLXVzYWdl}
jwt.header=Authorization
jwt.prefix=Bearer
jwt.expiration-time=86400000
app.security.super-admin-registration.enabled=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# Proxy Support (Swagger in Production)
server.forward-headers-strategy=framework