spring:
  application:
    name: portfolio-gateway-test
  
  cloud:
    gateway:
      routes:
        - id: feature-flag-api
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
        - id: portfolio-frontend
          uri: http://localhost:8082
          predicates:
            - Path=/**

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
    defaults:
      enabled: true
