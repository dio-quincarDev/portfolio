spring:
  application:
    name: portfolio-gateway-test
  
  # Redirigir URLs para evitar fallos de resolución de DNS (SERVFAIL) en el entorno de CI
  cloud:
    gateway:
      routes:
        - id: feature-flag-api
          uri: http://localhost:8081
        - id: portfolio-frontend
          uri: http://localhost:8082

  # Configuración de Redis inofensiva para que el contexto cargue
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoint:
    health:
      show-details: always
  health:
    # Deshabilitar solo el indicador de salud de Redis para evitar el status 503
    redis:
      enabled: false
    # Mantener otros indicadores activos
    defaults:
      enabled: true
