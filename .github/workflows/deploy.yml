name: 🏗️ CI/CD - Portfolio

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==================== CI VALIDATION ====================
  ci-validation:
    name: ✅ CI Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend Tests (Gateway)
        working-directory: ./backend/portfolio-gateway
        run: ./mvnw test -B

      - name: Backend Tests (API)
        working-directory: ./backend/feat-flag-api-bytes-colabs
        run: ./mvnw test -B

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Frontend Lint
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm run lint

  # ==================== BUILD BACKENDS (Java) ====================
  backend-build:
    name: 🔨 Build Java Apps
    runs-on: ubuntu-latest
    needs: [ci-validation]
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build API Gateway
        working-directory: ./backend/portfolio-gateway
        run: mvn clean package -DskipTests -B

      - name: Build Feature Flag API
        working-directory: ./backend/feat-flag-api-bytes-colabs
        run: mvn clean package -DskipTests -B

      - name: Generate version tag
        id: version
        run: echo "version=$(date +%Y%m%d)-${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

  # ==================== DOCKER BUILD & PUSH ====================
  docker-build-push:
    name: 🐳 Build & Push Multi-Arch Images
    runs-on: ubuntu-latest
    needs: [backend-build, ci-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU (Para Multi-Arquitectura)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Gateway Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/portfolio-gateway
          file: ./backend/portfolio-gateway/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/portfolio-gateway:${{ needs.backend-build.outputs.version }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/feat-flag-api-bytes-colabs
          file: ./backend/feat-flag-api-bytes-colabs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/portfolio-backend:${{ needs.backend-build.outputs.version }}

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/portfolio-frontend:${{ needs.backend-build.outputs.version }}

  # ==================== DEPLOY TO ORACLE CLOUD ====================
  deploy-oci:
    name: 🚀 Deploy via SSH to OCI
    runs-on: ubuntu-latest
    needs: [backend-build, docker-build-push, ci-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "~/portfolio"

      - name: Execute Remote Deploy Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ~/portfolio
            
            # Exportar variables indispensables
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export TAG=${{ needs.backend-build.outputs.version }}
            
            # Descargar imágenes nuevas de Docker Hub
            docker compose pull
            
            # Levantar servicios
            docker compose up -d
            
            # Limpieza agresiva de imágenes viejas para proteger el disco de OCI
            docker image prune -af
